<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LLM JSON Manager</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background-color: #f4f4f4; color: #333; }
        header { background-color: #222; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { background-color: white; width: 95%; max-width: 1000px; margin: 20px auto; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); min-height: 400px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #f8f8f8; border-bottom: 2px solid #333; padding: 12px; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 10px; font-size: 14px; }
        .title-click { color: #0066cc; cursor: pointer; font-weight: bold; }
        .btn { padding: 8px 15px; cursor: pointer; border: none; border-radius: 3px; font-weight: bold; }
        .btn-add { background-color: #28a745; color: white; }
        .btn-del { background-color: #dc3545; color: white; padding: 3px 8px; font-size: 11px; }
        .btn-save { background-color: #007bff; color: white; width: 100%; margin-top: 20px; font-size: 16px; padding: 12px; }
        .hidden { display: none !important; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; justify-content:center; align-items:center; z-index: 1000; }
        .modal { background: white; padding: 25px; width: 90%; max-width: 500px; border-radius: 8px; position: relative; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; box-sizing: border-box; }
        #json-output-area { background: #fffbe6; padding: 20px; margin-top: 20px; border: 2px dashed #faad14; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 12px; background: #fff; padding: 10px; border: 1px solid #ccc; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 18px;">👤 LLM Board Manager</div>
    <button class="btn btn-add" onclick="openModal()">+ 새 글 작성</button>
</header>

<div class="container">
    <table>
        <thead>
            <tr>
                <th style="width: 50px;">No</th>
                <th>제목</th>
                <th style="width: 100px;">관리</th>
            </tr>
        </thead>
        <tbody id="list-body"></tbody>
    </table>

    <button class="btn btn-save" onclick="exportJSON()">최종 결과 JSON 생성하기</button>

    <div id="json-output-area" class="hidden">
        <h3>✅ 생성된 JSON (복사해서 data.json에 덮어쓰기)</h3>
        <pre id="json-pre"></pre>
        <button class="btn" onclick="copyToClipboard()">클립보드 복사</button>
    </div>
</div>

<div id="detail-modal" class="overlay hidden">
    <div class="modal">
        <h2 id="view-title" style="margin-top:0;"></h2>
        <div id="view-content" style="min-height: 100px; border-top: 1px solid #eee; padding-top:10px;"></div>
        <button class="btn" onclick="closeDetail()" style="margin-top:20px;">닫기</button>
    </div>
</div>

<div id="write-modal" class="overlay hidden">
    <div class="modal">
        <h2 style="margin-top:0;">새 글 추가</h2>
        <input type="number" id="in-no" placeholder="번호">
        <input type="text" id="in-title" placeholder="제목">
        <textarea id="in-content" rows="6" placeholder="내용"></textarea>
        <div style="text-align: right;">
            <button class="btn" onclick="closeModal()">취소</button>
            <button class="btn btn-add" onclick="addNewPost()">추가</button>
        </div>
    </div>
</div>

<script>
    let currentData = [];

    // JSON 불러오기 (실패해도 에러 팝업 안 뜨게 수정)
    async function loadData() {
        try {
            const res = await fetch('data.json');
            if (!res.ok) throw new Error();
            currentData = await res.json();
        } catch (e) {
            console.warn("data.json 로드 실패. 빈 리스트로 시작합니다.");
            currentData = [];
        }
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('list-body');
        tbody.innerHTML = currentData.map((item, idx) => `
            <tr>
                <td>${item.no}</td>
                <td class="title-click" onclick="viewDetail(${idx})">${item.title}</td>
                <td><button class="btn btn-del" onclick="deletePost(${idx})">삭제</button></td>
            </tr>
        `).join('');
    }

    function viewDetail(idx) {
        const item = currentData[idx];
        document.getElementById('view-title').innerText = item.title;
        document.getElementById('view-content').innerHTML = item.content.replace(/\n/g, '<br>');
        document.getElementById('detail-modal').classList.remove('hidden');
    }

    function closeDetail() { document.getElementById('detail-modal').classList.add('hidden'); }
    function openModal() { 
        document.getElementById('in-no').value = currentData.length > 0 ? Number(currentData[0].no) + 1 : 1;
        document.getElementById('write-modal').classList.remove('hidden'); 
    }
    function closeModal() { document.getElementById('write-modal').classList.add('hidden'); }

    function addNewPost() {
        const title = document.getElementById('in-title').value;
        if(!title) return alert("제목을 입력하세요.");
        
        const newPost = {
            no: document.getElementById('in-no').value,
            title: title,
            name: "관리자",
            viewcnt: 0,
            content: document.getElementById('in-content').value
        };
        currentData.unshift(newPost);
        renderTable();
        closeModal();
    }

    function deletePost(idx) {
        if(confirm("삭제하시겠습니까?")) {
            currentData.splice(idx, 1);
            renderTable();
        }
    }

    function exportJSON() {
        document.getElementById('json-pre').innerText = JSON.stringify(currentData, null, 4);
        document.getElementById('json-output-area').classList.remove('hidden');
    }

    function copyToClipboard() {
        const text = document.getElementById('json
