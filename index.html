<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LLM Study Board</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background-color: #333; color: white; padding: 10px 20px; display: flex; align-items: center; }
        .container { background-color: white; width: 95%; margin: 20px auto; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #f8f8f8; border-top: 1px solid #ddd; border-bottom: 2px solid #333; padding: 10px; text-align: left; font-size: 14px; }
        td { border-bottom: 1px solid #eee; padding: 12px 10px; font-size: 14px; }
        .title-link { color: #0066cc; text-decoration: none; }
        .title-link:hover { text-decoration: underline; }
        tr:hover { background-color: #fafafa; }
    </style>
</head>
<body>
    <header><strong>my-board</strong></header>
    <div class="container">
        <h2>👤 LLM(Large Language Model)</h2>
        <table>
            <thead>

                    <th style="width: 50px;">No</th>

                    <th style="width: 100px;">Name</th>

                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1741</td>
                    <td><a href="#" class="title-link">[13][RAG] Hybrid Search 서비스, Multyquery, Rag Fusion, Streamlit 사용</a></td>
                    <td>관리자</td>
                    <td>104</td>
                </tr>
                <tr>
                    <td>1740</td>
                    <td><a href="#" class="title-link">[12][RAG] Hybrid Search 서비스 (Multyquery, Hybrid Search, Rag Fusion)</a></td>

                    <td>100</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
