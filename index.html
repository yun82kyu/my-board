<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LLM Board Manager</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background-color: #f4f4f4; color: #333; }
        header { background-color: #222; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { background-color: white; width: 95%; max-width: 1000px; margin: 20px auto; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); min-height: 450px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #f8f8f8; border-bottom: 2px solid #333; padding: 12px; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 10px; font-size: 14px; }
        .title-click { color: #0066cc; cursor: pointer; font-weight: bold; }
        .btn { padding: 8px 15px; cursor: pointer; border: none; border-radius: 3px; font-weight: bold; }
        .btn-add { background-color: #28a745; color: white; }
        .btn-del { background-color: #dc3545; color: white; padding: 3px 8px; font-size: 11px; }
        .hidden { display: none !important; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; justify-content:center; align-items:center; z-index: 1000; }
        .modal { background: white; padding: 25px; width: 90%; max-width: 500px; border-radius: 8px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; box-sizing: border-box; }
        
        /* 실시간 JSON 결과창 스타일 */
        .json-box { background: #2d2d2d; color: #ccc; padding: 15px; margin-top: 30px; border-radius: 5px; position: relative; }
        .json-box h3 { color: #fff; margin-top: 0; font-size: 14px; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 12px; max-height: 250px; overflow-y: auto; color: #adff2f; }
        .copy-badge { position: absolute; top: 15px; right: 15px; background: #555; color: #fff; padding: 4px 8px; font-size: 11px; cursor: pointer; border-radius: 3px; }
    </style>

    <script>
        let currentData = [];

        // 1. 페이지 로드 시 기존 JSON 가져오기
        async function loadData() {
            try {
                const res = await fetch('data.json?v=' + new Date().getTime()); // 캐시 방지
                if (!res.ok) throw new Error();
                currentData = await res.json();
            } catch (e) {
                console.warn("기존 data.json이 없거나 형식이 틀립니다. 빈 목록으로 시작합니다.");
                currentData = [];
            }
            updateView();
        }

        // 2. 화면 전체 업데이트 (표 + JSON 결과창)
        function updateView() {
            renderTable();
            renderJSON();
        }

        // 3. 표 그리기
        function renderTable() {
            const tbody = document.getElementById('list-body');
            tbody.innerHTML = currentData.map((item, idx) => `
                <tr>
                    <td>${item.no}</td>
                    <td class="title-click" onclick="viewDetail(${idx})">${item.title}</td>
                    <td><button class="btn btn-del" onclick="deletePost(${idx})">삭제</button></td>
                </tr>
            `).join('');
        }

        // 4. 하단 JSON 텍스트 업데이트
        function renderJSON() {
            document.getElementById('json-pre').innerText = JSON.stringify(currentData, null, 4);
        }

        // 5. 새 글 추가 로직
        function addNewPost() {
            const title = document.getElementById('in-title').value;
            const content = document.getElementById('in-content').value;
            if(!title) return alert("제목을 입력하세요!");

            const newPost = {
                no: parseInt(document.getElementById('in-no').value),
                title: title,
                name: "관리자",
                viewcnt: 0,
                content: content
            };

            currentData.unshift(newPost); // 리스트 맨 앞에 추가
            updateView(); // 즉시 표와 JSON 갱신
            closeModal();
            
            // 폼 초기화
            document.getElementById('in-title').value = "";
            document.getElementById('in-content').value = "";
        }

        // 6. 삭제 로직
        function deletePost(idx) {
            if(confirm("이 글을 삭제할까요?")) {
                currentData.splice(idx, 1);
                updateView(); // 즉시 표와 JSON 갱신
            }
        }

        // 모달 제어 함수들
        function openModal() {
            const nextNo = currentData.length > 0 ? Math.max(...currentData.map(d => d.no)) + 1 : 1;
            document.getElementById('in-no').value = nextNo;
            document.getElementById('write-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('write-modal').classList.add('hidden'); }
        function viewDetail(idx) {
            const item = currentData[idx];
            document.getElementById('view-title').innerText = item.title;
            document.getElementById('view-content').innerHTML = item.content.replace(/\n/g, '<br>');
            document.getElementById('detail-modal').classList.remove('hidden');
        }
        function closeDetail() { document.getElementById('detail-modal').classList.add('hidden'); }
        
        function copyToClipboard() {
            const text = document.getElementById('json-pre').innerText;
            navigator.clipboard.writeText(text).then(() => alert("JSON 코드가 복사되었습니다! 이제 GitHub의 data.json에 덮어쓰기 하세요."));
        }

        window.onload = loadData;
    </script>
</head>
<body>

<header>
    <div style="font-size: 18px; font-weight: bold;">👤 LLM Study Manager</div>
    <button class="btn btn-add" onclick="openModal()">+ 새 글 추가</button>
</header>

<div class="container">
    <h3>게시글 목록</h3>
    <table>
        <thead>
            <tr>
                <th style="width: 60px;">번호</th>
                <th>제목</th>
                <th style="width: 80px;">관리</th>
            </tr>
        </thead>
        <tbody id="list-body">
            <tr><td colspan="3" style="text-align:center;">데이터를 불러오는 중...</td></tr>
        </tbody>
    </table>

    <div class="json-box">
        <h3>실시간 데이터 (data.json 저장용)</h3>
        <span class="copy-badge" onclick="copyToClipboard()">코드 복사</span>
        <pre id="json-pre">[]</pre>
    </div>
</div>

<div id="detail-modal" class="overlay hidden">
    <div class="modal">
        <h2 id="view-title" style="margin-top:0; color:#0066cc;"></h2>
        <div id="view-content" style="min-height: 150px; border-top: 1px solid #eee; padding-top:15px; line-height:1.6;"></div>
        <div style="text-align: right; margin-top:20px;">
            <button class="btn" onclick="closeDetail()">닫기</button>
        </div>
    </div>
</div>

<div id="write-modal" class="overlay hidden">
    <div class="modal">
        <h2 style="margin-top:0;">새 게시글 작성</h2>
        <label style="font-size:12px;">번호</label>
        <input type="number" id="in-no">
        <input type="text" id="in-title" placeholder="제목을 입력하세요">
        <textarea id="in-content" rows="6" placeholder="상세 내용을 입력하세요 (엔터로 줄바꿈 가능)"></textarea>
        <div style="text-align: right; margin-top:10px;">
            <button class="btn" onclick="closeModal()" style="background:#eee; color:#333;">취소</button>
            <button class="btn btn-add" onclick="addNewPost()">추가하기</button>
        </div>
    </div>
</div>

</body>
</html>
